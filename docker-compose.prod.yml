services:
  backend:
    image: ghcr.io/alemigliorin/multiagentes-backend:latest
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./backend/tmp:/app/tmp
      - ./backend/videos:/app/videos
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nginx-proxy

  frontend:
    image: ghcr.io/alemigliorin/multiagentes-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_OS_SECURITY_KEY=${NEXT_PUBLIC_OS_SECURITY_KEY}
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_OS_SECURITY_KEY=${NEXT_PUBLIC_OS_SECURITY_KEY}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    expose:
      - "3000"
    networks:
      - nginx-proxy

  frontend-streamlit:
    image: ghcr.io/alemigliorin/multiagentes-streamlit:latest
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "8501"
    environment:
      - BACKEND_HOST=http://backend:8000
    volumes:
      - ./backend/tmp:/app/backend/tmp
      - ./backend/videos:/app/backend/videos
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
