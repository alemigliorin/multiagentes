name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run Pytest with Coverage
        # Fail if coverage is under 90%
        run: uv run pytest tests/ -v --cov=. --cov-fail-under=75 --cov-report=term-missing

  clean-code:
    name: Ruff Linter & Formatter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Run Ruff Linter
        run: uv run ruff check .

  security:
    name: Bandit & pip-audit (Security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Bandit Security Scanner
        # -r: recursive, -lll: High severity only, -x: exclude tests directory
        run: uv run bandit -r . -lll -x ./tests

      - name: Run pip-audit Vulnerability Scanner
        # pip-audit requer o arquivo requirements ou o env, o uv export gera o requirements pra ele
        run: |
          uv export --format requirements-txt > reqs.txt
          uv run pip-audit -r reqs.txt

  docker-validate:
    name: Validate and Push Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
