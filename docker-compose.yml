services:
  backend:
    image: ghcr.io/alemigliorin/multiagentes-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/tmp:/app/tmp
      - ./backend/videos:/app/videos
    networks:
      - nginx-proxy

  frontend:
    image: ghcr.io/alemigliorin/multiagentes-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.migliorinlabs.cloud
    networks:
      - nginx-proxy


networks:
  nginx-proxy:
    external: true
