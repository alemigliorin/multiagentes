services:
 backend:
  build:
   context: ./backend
   dockerfile: Dockerfile
  restart: unless-stopped
  expose:
   - "8000"
  env_file:
   - ./backend/.env
  volumes:
   - ./backend/tmp:/app/tmp
   - ./backend/videos:/app/videos
  networks:
   - nginx-proxy

 frontend:
  build:
   context: ./frontend
   dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
   - backend
  expose:
   - "3000"
  environment:
   - NEXT_PUBLIC_API_URL=https://api.migliorinlabs.cloud
  networks:
   - nginx-proxy

 frontend-streamlit:
  build:
   context: ./frontend-streamlit
   dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
   - backend
  expose:
   - "8501"
  environment:
   - BACKEND_HOST=http://backend:8000
  volumes:
   - ./backend/tmp:/app/backend/tmp
   - ./backend/videos:/app/backend/videos
  networks:
   - nginx-proxy

networks:
 nginx-proxy:
  external: true
